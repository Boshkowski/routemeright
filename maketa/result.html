<!DOCTYPE html><html lang="sr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f172a;--card:#1e293b;--or:#f97316;--or2:#ea580c;--txt:#e2e8f0;--mut:#94a3b8;--line:rgba(148,163,184,.16);
    --g:#22c55e;--a:#f59e0b;--r:#ef4444}
  *{box-sizing:border-box;margin:0;padding:0;font-family:Archivo,system-ui,sans-serif}
  body{width:390px;height:844px;overflow:hidden;background:var(--bg);position:relative}

  /* MAPA */
  .map{position:absolute;top:0;left:0;right:0;height:440px;background:radial-gradient(120% 90% at 40% 20%,#16233b,#0b1424 70%,#0a1120)}
  .map svg{position:absolute;inset:0;width:100%;height:440px}
  .lbl{position:absolute;background:#0b1424;border:1px solid var(--line);border-radius:10px;padding:5px 9px;font-size:12px;font-weight:800;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.5)}
  .lbl.sel{background:var(--or);border-color:var(--or)}
  .lbl small{font-weight:600;opacity:.85;font-size:10.5px}

  /* top bar preko mape */
  .tbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:14px;z-index:5}
  .tbar .ic{width:38px;height:38px;border-radius:12px;background:rgba(15,23,42,.9);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .tbar .ic svg{width:19px;height:19px;stroke:var(--txt)}
  .tbar .ttl{flex:1;font-size:16px;font-weight:800;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.6)}

  /* BOTTOM SHEET */
  .sheet{position:absolute;left:0;right:0;bottom:0;top:420px;background:var(--bg);border-radius:22px 22px 0 0;
    border-top:1px solid var(--line);padding:8px 16px 16px;box-shadow:0 -10px 30px rgba(0,0,0,.5);overflow:hidden}
  .grab{width:38px;height:4px;border-radius:2px;background:#475569;margin:0 auto 12px}
  .tabs{display:flex;gap:8px;margin-bottom:14px;overflow:hidden}
  .tab{white-space:nowrap;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 13px;font-size:12.5px;font-weight:700;color:var(--txt)}
  .tab .s{display:block;font-size:10.5px;color:var(--mut);font-weight:600;margin-top:1px}
  .tab.on{border-color:var(--or);background:rgba(249,115,22,.12)}
  .tab.on .n{color:var(--or)}

  .grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;margin-bottom:12px}
  .m{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px}
  .m .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:5px}
  .m .v{font-size:19px;font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
  .m .v small{font-size:12px;color:var(--mut);font-weight:600}
  .m.wx{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3)}
  .m.wx .v{color:var(--g);display:flex;align-items:center;gap:7px}
  .m.wx .v svg{width:19px;height:19px;stroke:var(--g)}
  .dots i{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--or);margin-right:3px}
  .dots i.off{background:#334155}

  /* kad krenuti strip */
  .kk{margin-bottom:14px}
  .kk .h{font-size:11px;color:var(--or);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
  .kkrow{display:flex;gap:5px}
  .kkc{flex:1;text-align:center}
  .kkbar{height:34px;border-radius:6px;margin-bottom:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px}
  .kkc .tm{font-size:10.5px;color:var(--mut);font-weight:700;font-variant-numeric:tabular-nums}
  .kkc.best .tm{color:var(--or)}
  .kkc.best .kkbar{outline:2px solid var(--or);outline-offset:1px}

  .btns{display:flex;gap:9px}
  .b{flex:1;border-radius:14px;padding:14px;text-align:center;font-size:15px;font-weight:800;border:1px solid var(--line);background:var(--card);color:var(--txt);display:flex;align-items:center;justify-content:center;gap:7px}
  .b svg{width:17px;height:17px;stroke:currentColor}
  .b.p{flex:1.4;background:linear-gradient(135deg,var(--or),var(--or2));color:#fff;border:none;box-shadow:0 8px 20px rgba(249,115,22,.3)}
</style></head><body>

<div class="map">
  <svg viewBox="0 0 390 440" preserveAspectRatio="none">
    <g stroke="#25314a" stroke-width="1.2" fill="none" opacity=".6"><path d="M-20 120 Q120 100 220 180 T430 200"/><path d="M-20 320 Q140 300 250 360 T430 380"/></g>
    <!-- alternativa (siva) -->
    <path d="M60 360 C 140 340, 200 300, 250 240 C 300 180, 320 140, 340 90" stroke="#64748b" stroke-width="4" fill="none" opacity=".55" stroke-linecap="round"/>
    <!-- izabrana (narandzasta) -->
    <path d="M60 360 C 110 300, 90 240, 160 210 C 240 176, 250 130, 340 90" stroke="#f97316" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="360" r="8" fill="#22c55e" stroke="#0f172a" stroke-width="3"/>
    <circle cx="340" cy="90" r="8" fill="#fff" stroke="#c2570a" stroke-width="3"/>
  </svg>
  <div class="lbl sel" style="left:150px;top:150px">553 km<br><small>vedro · vijugava</small></div>
  <div class="lbl" style="left:250px;top:250px">798 km<br><small>autoput</small></div>
</div>

<div class="tbar">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></div>
  <div class="ttl">Beograd → Split</div>
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></div>
</div>

<div class="sheet">
  <div class="grab"></div>
  <div class="tabs">
    <div class="tab on"><span class="n" style="font-weight:800">Vijugava ★</span><span class="s">predeli</span></div>
    <div class="tab"><span class="n">Balans</span><span class="s">536 km</span></div>
    <div class="tab"><span class="n">Najbrža</span><span class="s">autoput</span></div>
  </div>

  <div class="grid">
    <div class="m wx"><div class="k">Vreme na ruti</div><div class="v"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6L7 7M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4"/></svg>Vedro</div></div>
    <div class="m"><div class="k">Dužina</div><div class="v">553 <small>km</small></div></div>
    <div class="m"><div class="k">Trajanje</div><div class="v">9<small>h</small> 40</div></div>
    <div class="m"><div class="k">Trošak (R1150GS)</div><div class="v">48 <small>€</small></div></div>
    <div class="m"><div class="k">Krivine</div><div class="v dots"><i></i><i></i><i></i><i></i><i class="off"></i></div></div>
    <div class="m"><div class="k">Putarina</div><div class="v">0 <small>€</small></div></div>
  </div>

  <div class="kk">
    <div class="h">Kad krenuti — vreme na ruti</div>
    <div class="kkrow">
      <div class="kkc"><div class="kkbar" style="background:linear-gradient(#22c55e,#166534)"></div><div class="tm">08h</div></div>
      <div class="kkc best"><div class="kkbar" style="background:linear-gradient(#22c55e,#166534)"></div><div class="tm">09h</div></div>
      <div class="kkc"><div class="kkbar" style="background:linear-gradient(#22c55e,#4d7c0f)"></div><div class="tm">10h</div></div>
      <div class="kkc"><div class="kkbar" style="background:linear-gradient(#f59e0b,#b45309)"></div><div class="tm">11h</div></div>
      <div class="kkc"><div class="kkbar" style="background:linear-gradient(#ef4444,#991b1b)"></div><div class="tm">12h</div></div>
      <div class="kkc"><div class="kkbar" style="background:linear-gradient(#ef4444,#991b1b)"></div><div class="tm">13h</div></div>
    </div>
  </div>

  <div class="btns">
    <div class="b p"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>Kreni</div>
    <div class="b"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Stanica</div>
    <div class="b"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Čuvaj</div>
  </div>
</div>

</body></html>

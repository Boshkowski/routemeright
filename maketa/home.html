<!DOCTYPE html><html lang="sr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f172a;--card:#1e293b;--or:#f97316;--or2:#ea580c;--txt:#e2e8f0;--mut:#94a3b8;--line:rgba(148,163,184,.16)}
  *{box-sizing:border-box;margin:0;padding:0;font-family:Archivo,system-ui,sans-serif}
  body{width:390px;height:844px;overflow:hidden;background:var(--bg);position:relative;-webkit-font-smoothing:antialiased}

  /* MAPA (pozadina) */
  .map{position:absolute;inset:0;background:
    radial-gradient(120% 90% at 30% 20%,#16233b 0%,#0d1626 60%,#0a1120 100%)}
  .map svg{position:absolute;inset:0;width:100%;height:100%}

  /* TOP: search + chips */
  .top{position:absolute;top:0;left:0;right:0;padding:14px 14px 8px;z-index:5}
  .search{display:flex;align-items:center;gap:11px;background:rgba(15,23,42,.92);backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:16px;padding:11px 14px;box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .search .r{width:26px;height:26px;border-radius:7px;flex:none}
  .search input{flex:1;background:none;border:none;color:var(--txt);font-size:15.5px;font-weight:600;outline:none}
  .search input::placeholder{color:var(--mut)}
  .search .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#334155,#1e293b);flex:none;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--or)}
  .chips{display:flex;gap:8px;margin-top:10px;overflow:hidden}
  .chip{display:flex;align-items:center;gap:6px;background:rgba(15,23,42,.88);border:1px solid var(--line);
    border-radius:999px;padding:8px 13px;font-size:13px;font-weight:700;color:var(--txt);white-space:nowrap}
  .chip svg{width:15px;height:15px;stroke:var(--or)}
  .chip.on{background:var(--or);border-color:var(--or);color:#fff}
  .chip.on svg{stroke:#fff}

  /* desna plutajuća dugmad */
  .fabs{position:absolute;right:14px;top:150px;display:flex;flex-direction:column;gap:10px;z-index:5}
  .fab{width:44px;height:44px;border-radius:14px;background:rgba(15,23,42,.9);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .fab svg{width:21px;height:21px;stroke:var(--txt)}

  /* BOTTOM SHEET (peek) */
  .sheet{position:absolute;left:0;right:0;bottom:58px;background:rgba(15,23,42,.97);backdrop-filter:blur(16px);
    border-radius:22px 22px 0 0;border-top:1px solid var(--line);padding:10px 16px 16px;z-index:6;
    box-shadow:0 -10px 34px rgba(0,0,0,.45)}
  .grab{width:38px;height:4px;border-radius:2px;background:#475569;margin:2px auto 12px}
  .wx{display:flex;align-items:center;gap:10px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.28);
    border-radius:14px;padding:11px 13px;margin-bottom:12px}
  .wx svg{width:22px;height:22px;stroke:var(--or);flex:none}
  .wx b{color:#fff;font-weight:800}
  .wx .t{font-size:13.5px;color:#fdba74;line-height:1.35}
  .qr{display:flex;gap:9px}
  .q{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center}
  .q svg{width:20px;height:20px;stroke:var(--or);margin-bottom:5px}
  .q .l{font-size:12.5px;font-weight:700;color:var(--txt)}
  .q .s{font-size:10.5px;color:var(--mut)}
  .cta{display:block;text-align:center;background:linear-gradient(135deg,var(--or),var(--or2));color:#fff;
    border-radius:15px;padding:15px;font-size:16px;font-weight:800;margin-top:12px;box-shadow:0 8px 22px rgba(0,0,0,.35)}

  /* BOTTOM NAV */
  .nav{position:absolute;left:0;right:0;bottom:0;height:58px;background:rgba(11,17,32,.98);border-top:1px solid var(--line);
    display:flex;z-index:7}
  .nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--mut);
    font-size:10.5px;font-weight:700;text-decoration:none}
  .nav a svg{width:22px;height:22px;stroke:var(--mut)}
  .nav a.on{color:var(--or)}
  .nav a.on svg{stroke:var(--or)}
</style></head><body>

<div class="map">
  <svg viewBox="0 0 390 844" preserveAspectRatio="none">
    <g stroke="#25314a" stroke-width="1.4" fill="none" opacity=".7">
      <path d="M-20 300 Q120 260 200 360 T420 380"/><path d="M-20 500 Q140 470 260 540 T430 560"/>
      <path d="M90 -20 Q120 200 60 420 T140 900"/><path d="M300 -20 Q260 240 330 460 T280 900"/>
    </g>
    <path d="M70 640 C 120 560, 100 460, 180 420 C 260 380, 250 300, 330 250" stroke="#f97316" stroke-width="5" fill="none" opacity=".9" stroke-linecap="round"/>
    <circle cx="70" cy="640" r="7" fill="#22c55e" stroke="#0f172a" stroke-width="3"/>
    <circle cx="330" cy="250" r="7" fill="#fff" stroke="#c2570a" stroke-width="3"/>
  </svg>
</div>

<div class="top">
  <div class="search">
    <svg class="r" viewBox="0 0 512 512"><rect width="512" height="512" rx="120" fill="#1e293b"/><g fill="none" stroke-linecap="butt" stroke-linejoin="round"><path d="M170 414 V206 Q170 161 215 161 H274 A81 81 0 0 1 274 323 L340 430" stroke="#f97316" stroke-width="72"/><path d="M170 407 V206 Q170 161 215 161 H274 A81 81 0 0 1 274 323 L333 421" stroke="#fff" stroke-width="9" stroke-dasharray="18 25"/></g></svg>
    <input placeholder="Kuda ćeš danas?" readonly>
    <div class="av">B</div>
  </div>
  <div class="chips">
    <div class="chip on"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 20l-5.5-3V4L9 7m0 13l6-3m-6 3V7m6 10l5.5 3V7l-5.5-3m0 13V4m0 3L9 7"/></svg>Poznate rute</div>
    <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 12a9 9 0 11-9-9"/><path d="M21 3v6h-6"/></svg>Kružna tura</div>
    <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>Kafane</div>
    <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 14.9A7 7 0 1115.7 8h1.8a4.5 4.5 0 012.5 8.2M16 14v6M8 14v6M12 16v6"/></svg>Radar</div>
  </div>
</div>

<div class="fabs">
  <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2l9 4.5-9 4.5-9-4.5L12 2zM3 17l9 4.5 9-4.5M3 12l9 4.5 9-4.5"/></svg></div>
  <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="3"/></svg></div>
  <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg></div>
</div>

<div class="sheet">
  <div class="grab"></div>
  <div class="wx">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4"/></svg>
    <div class="t"><b>Vedro do 18h</b> — savršen dan za vožnju. Kiša tek uveče kod Zlatibora.</div>
  </div>
  <div class="qr">
    <div class="q"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg><div class="l">Kuća</div><div class="s">Beograd</div></div>
    <div class="q"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg><div class="l">Nedavno</div><div class="s">Đerdap</div></div>
    <div class="q"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg><div class="l">Sačuvane</div><div class="s">7 ruta</div></div>
  </div>
  <a class="cta">Isplaniraj vožnju</a>
</div>

<div class="nav">
  <a class="on"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Planer</a>
  <a><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 20l-5.5-3V4L9 7l6-3 5.5 3v13L15 17z"/><path d="M9 7v13M15 4v13"/></svg>Rute</a>
  <a><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.9M16 3.1a4 4 0 010 7.8"/></svg>Zajednica</a>
  <a><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg>Ja</a>
</div>

</body></html>

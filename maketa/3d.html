<style>
  :root{--or:#f97316}
  *{box-sizing:border-box;margin:0;padding:0;font-family:Archivo,system-ui,sans-serif}
  html,body{height:100%;overflow:hidden;background:#0a1120}
  #map{position:absolute;inset:0}
  body[data-mode="day"]{--pill:rgba(255,255,255,.92);--pillbd:rgba(15,23,42,.12);--pilltx:#0f172a;--pillsub:#475569}
  body[data-mode="night"]{--pill:rgba(15,23,42,.9);--pillbd:rgba(148,163,184,.22);--pilltx:#e2e8f0;--pillsub:#94a3b8}

  /* gornji chip */
  .chip{position:absolute;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:5;display:flex;align-items:center;gap:9px;
    background:var(--pill);border:1px solid var(--pillbd);border-radius:999px;padding:8px 14px 8px 11px;
    box-shadow:0 6px 18px rgba(0,0,0,.25);color:var(--pilltx);font-weight:800;font-size:13.5px}
  .chip .live{width:9px;height:9px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 0 rgba(239,68,68,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 9px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
  .chip small{color:var(--pillsub);font-weight:700}

  /* dole levo dugmad */
  .ctl{position:absolute;left:14px;bottom:calc(40px + env(safe-area-inset-bottom));z-index:5;display:flex;flex-direction:column;gap:9px}
  .btn{display:flex;align-items:center;gap:9px;background:var(--pill);border:1px solid var(--pillbd);border-radius:14px;
    padding:11px 14px;color:var(--pilltx);font-weight:800;font-size:13.5px;box-shadow:0 6px 18px rgba(0,0,0,.22);cursor:pointer}
  .btn svg{width:18px;height:18px;stroke:var(--or);fill:none;flex:none}

  /* hint */
  .hint{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));z-index:6;
    background:rgba(15,23,42,.86);color:#e2e8f0;border:1px solid rgba(148,163,184,.25);border-radius:999px;
    padding:9px 16px;font-size:12.5px;font-weight:700;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.4);
    transition:opacity .6s;display:flex;align-items:center;gap:8px}
  .hint.gone{opacity:0;pointer-events:none}
  .hint b{color:var(--or)}

  /* friend markeri */
  .fr{display:flex;align-items:center;gap:7px;background:rgba(15,23,42,.92);border:1px solid rgba(148,163,184,.3);
    border-radius:999px;padding:4px 11px 4px 4px;box-shadow:0 6px 16px rgba(0,0,0,.45);transform:translateY(-6px)}
  .fr.me{border-color:var(--or);box-shadow:0 6px 20px rgba(249,115,22,.5)}
  .fr .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:900;font-size:13px;flex:none}
  .fr .lb{line-height:1.05}
  .fr .lb b{display:block;color:#fff;font-size:12.5px;font-weight:800}
  .fr .lb span{display:block;color:#94a3b8;font-size:10px;font-weight:700}
  .fr::after{content:"";position:absolute;bottom:-6px;left:15px;width:0;height:0;
    border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid rgba(15,23,42,.92)}
  .endpt{width:16px;height:16px;border-radius:50%;border:3px solid #0f172a;box-shadow:0 2px 8px rgba(0,0,0,.6)}
  .maplibregl-ctrl-top-right{top:calc(10px + env(safe-area-inset-top))}
</style></head>

const STYLES={light:'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
              dark:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json'};
// izgled prati SISTEM (prefers-color-scheme)
const mq=window.matchMedia('(prefers-color-scheme: dark)');
let mode=mq.matches?'dark':'light';
document.body.dataset.mode=mode;

const HOME={center:[18.808,42.436],zoom:12.2,pitch:62,bearing:18};
let is3D=true;
const map=new maplibregl.Map({container:'map',style:STYLES[mode],center:HOME.center,zoom:HOME.zoom,
  pitch:HOME.pitch,bearing:HOME.bearing,maxPitch:82,attributionControl:false});
map.addControl(new maplibregl.NavigationControl({showCompass:false,showZoom:true}),'top-right');

// kompas = 2D/3D toggle + reset na sever (stoji ispod +/-)
class CompassToggle{
  onAdd(m){this._m=m;
    const c=document.createElement('div');c.className='maplibregl-ctrl maplibregl-ctrl-group';
    const b=document.createElement('button');b.type='button';b.className='cmpbtn';b.title='2D / 3D · sever';
    b.innerHTML='<span class="cmp"><svg class="ndl" viewBox="0 0 24 24" width="20" height="20">'+
      '<polygon points="12,3 9,13 12,11 15,13" fill="#ef4444"/>'+
      '<polygon points="12,21 9,11 12,13 15,11" fill="#94a3b8"/></svg>'+
      '<span class="badge" id="cmode">2D</span></span>';
    b.onclick=()=>{is3D=!is3D;document.getElementById('cmode').textContent=is3D?'2D':'3D';
      m.easeTo({pitch:is3D?HOME.pitch:0,bearing:0,duration:600});};
    this._ndl=b.querySelector('.ndl');this._c=c;c.appendChild(b);
    const upd=()=>{this._ndl.style.transform='rotate('+(-m.getBearing())+'deg)';};
    m.on('rotate',upd);m.on('move',upd);upd();
    return c;}
  onRemove(){this._c.parentNode.removeChild(this._c);}
}
map.addControl(new CompassToggle(),'top-right');
map.addControl(new maplibregl.AttributionControl({compact:true,customAttribution:'Teren: AWS · OSM'}),'bottom-right');

function firstSymbol(){const ls=map.getStyle().layers||[];for(const l of ls)if(l.type==='symbol')return l.id;return undefined;}
function addTerrainRoute(){
  if(!map.getSource('terr'))map.addSource('terr',{type:'raster-dem',
    tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
    encoding:'terrarium',tileSize:256,maxzoom:14});
  map.setTerrain({source:'terr',exaggeration:1.5});
  if(!map.getLayer('hill'))map.addLayer({id:'hill',type:'hillshade',source:'terr',
    paint:{'hillshade-exaggeration':0.4}},firstSymbol());
  if(!map.getSource('route'))map.addSource('route',{type:'geojson',
    data:{type:'Feature',geometry:{type:'LineString',coordinates:ROUTE}}});
  if(!map.getLayer('route-cas'))map.addLayer({id:'route-cas',type:'line',source:'route',
    layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':'#7c2d0a','line-width':9,'line-opacity':.9}});
  if(!map.getLayer('route-ln'))map.addLayer({id:'route-ln',type:'line',source:'route',
    layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':'#f97316','line-width':5}});
}
function setSky(){try{map.setSky({'sky-color':mode==='dark'?'#0a1330':'#93c5fd',
  'sky-horizon-blend':0.5,'horizon-color':mode==='dark'?'#1b2745':'#d5e8ff',
  'horizon-fog-blend':0.5,'fog-color':mode==='dark'?'#0d1730':'#eef5ff','fog-ground-blend':0.7});}catch(e){}}

// prijatelji SU NA RUTI (indeksi na liniji)
const FRIENDS=[

 {n:'Ana',i:300,col:'#38bdf8',me:false,s:'penje serpentine'},
 {n:'Marko',i:703,col:'#a855f7',me:false,s:'pauza · Njeguši'}];
function endDot(color){const e=document.createElement('div');e.className='endpt';e.style.background=color;return e;}
let placed=false;
function addMarkers(){
  if(placed)return;placed=true;
  FRIENDS.forEach(f=>{const c=ROUTE[f.i];const el=document.createElement('div');el.className='fr'+(f.me?' me':'');
    el.innerHTML='<div class="av" style="background:'+f.col+'">'+f.n[0]+'</div>'+
      '<div class="lb"><b>'+f.n+'</b><span>'+f.s+'</span></div>';
    el.addEventListener('click',(e)=>{e.stopPropagation();
      map.easeTo({center:c,zoom:14.3,pitch:is3D?66:0,duration:1000});});
    new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat(c).addTo(map);});
}
map.on('load',()=>{addTerrainRoute();setSky();addMarkers();});
map.on('styledata',()=>{addTerrainRoute();setSky();});

// sistem promeni izgled -> mapa prati
mq.addEventListener('change',e=>{mode=e.matches?'dark':'light';
  document.body.dataset.mode=mode;map.setStyle(STYLES[mode]);});

// Centriraj = vrati na MOJU lokaciju (u demou = pin "Ti")
const ME=ROUTE[FRIENDS.find(f=>f.me).i];
document.getElementById('rc').onclick=()=>{is3D=true;document.getElementById('cmode').textContent='2D';

<!DOCTYPE html><html lang="sr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Archivo,system-ui,sans-serif}
  body{width:390px;height:844px;overflow:hidden;position:relative;
    background:radial-gradient(120% 80% at 50% 22%,#1c2c4a 0%,#0f172a 55%,#0a1120 100%)}
  .topo{position:absolute;inset:0;opacity:.13}
  .topo svg{width:100%;height:100%}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 34px;text-align:center}
  .logo{width:132px;height:132px;border-radius:32px;box-shadow:0 20px 50px rgba(249,115,22,.25)}
  h1{color:#e2e8f0;font-size:38px;font-weight:900;letter-spacing:-.02em;margin-top:22px}
  h1 b{color:#f97316}
  .tag{color:#f97316;font-weight:800;text-transform:uppercase;letter-spacing:.18em;font-size:12px;margin-top:8px}
  .pitch{color:#cbd5e1;font-size:16px;line-height:1.5;margin-top:20px;max-width:320px}
  .pitch b{color:#fff}
  .cta{position:absolute;left:28px;right:28px;bottom:56px}
  .cta a{display:block;text-align:center;text-decoration:none;border-radius:17px;padding:17px;font-size:17px;font-weight:800}
  .cta .p{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 12px 30px rgba(249,115,22,.4)}
  .cta .s{color:#94a3b8;font-size:14px;padding-top:16px}
</style></head><body>
<div class="topo"><svg viewBox="0 0 390 844" fill="none" stroke="#4a5f8a" stroke-width="1.4">
  <circle cx="90" cy="120" r="80"/><circle cx="90" cy="120" r="130"/><circle cx="90" cy="120" r="185"/>
  <circle cx="320" cy="700" r="70"/><circle cx="320" cy="700" r="120"/><circle cx="320" cy="700" r="175"/>
</svg></div>
<div class="wrap">
  <svg class="logo" viewBox="0 0 512 512">
    <defs><radialGradient id="g" cx="50%" cy="30%" r="90%"><stop offset="0%" stop-color="#2a3a5c"/><stop offset="100%" stop-color="#0b1120"/></radialGradient></defs>
    <rect width="512" height="512" fill="url(#g)"/>
    <g fill="none" stroke-linecap="butt" stroke-linejoin="round">
      <path d="M170 414 V206 Q170 161 215 161 H274 A81 81 0 0 1 274 323 L340 430" stroke="#c2570a" stroke-width="80"/>
      <path d="M170 414 V206 Q170 161 215 161 H274 A81 81 0 0 1 274 323 L340 430" stroke="#f97316" stroke-width="66"/>
      <path d="M170 407 V206 Q170 161 215 161 H274 A81 81 0 0 1 274 323 L333 421" stroke="#fff" stroke-width="7" stroke-dasharray="17 24"/>
    </g>
    <circle cx="170" cy="414" r="12" fill="#22c55e" stroke="#0f172a" stroke-width="5"/>
    <circle cx="340" cy="430" r="13" fill="#fff" stroke="#c2570a" stroke-width="5"/>
    <rect x="333" y="423" width="7" height="7" fill="#111"/><rect x="340" y="430" width="7" height="7" fill="#111"/>
  </svg>
  <h1>Route<b>Me</b>Right</h1>
  <div class="tag">Pametna ruta za motor</div>
  <p class="pitch">Zna <b>vreme na svakom kilometru</b> tvoje vožnje — pa ti kaže <b>kad da kreneš</b> i gde da sačekaš da kiša prođe.</p>
</div>
<div class="cta">
  <a class="p">Kreni</a>
  <a class="s">Prijavi se / Napravi nalog</a>
</div>
</body></html>

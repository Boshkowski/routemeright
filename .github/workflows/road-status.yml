name: Stanje na putevima + meteo upozorenja
# Sakuplja stanje na putevima (10 zemalja) i zvanicna meteo-upozorenja (Meteoalarm)
# u data/road_status.json - app ga cita staticki (nema server-a).
on:
  schedule:
    - cron: "17 * * * *"   # svakih sat vremena (Actions besplatan za javne repoe; commit samo ako ima promena)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: road-status
  cancel-in-progress: true
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sakupi podatke
        run: python3 tools/collect_road_status.py
      - name: Osvezi cene goriva (benzin BMB95 po zemljama)
        run: python3 update_prices.py || true
        continue-on-error: true
      - name: Commit ako ima promena
        run: |
          git config user.name "rmr-bot"
          git config user.email "boskodjurica@gmail.com"
          git add data/road_status.json data/prices.json
          git diff --cached --quiet && echo "nema promena" || git commit -m "auto: stanje na putevima + meteo upozorenja [skip ci]"
          git push
